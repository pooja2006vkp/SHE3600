<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{% block title %}She360{% endblock %}</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}" />
  {% block head %}{% endblock %}
</head>
<body>
  <nav class="navbar">
    <a href="/" class="nav-logo">She<span>360</span></a>
    <div class="nav-links">
      <a href="/">Home</a>
      {% if session.get('user_id') %}
        <a href="/dashboard">Dashboard</a>
        <a href="/admin">Admin</a>
        <button class="btn-outline" onclick="logout()">Logout</button>
      {% else %}
        <a href="/login" class="btn-primary">Sign In</a>
      {% endif %}
    </div>
    <button class="nav-toggle" onclick="toggleNav()">☰</button>
  </nav>

  <main>{% block content %}{% endblock %}</main>

  <footer class="footer">
    <div class="footer-inner">
      <p class="footer-logo">She<span>360</span></p>
      <p>Empowering women through knowledge &amp; community.</p>
      <p class="footer-copy">© 2026 She360. All rights reserved.</p>
    </div>
  </footer>

  <script src="{{ url_for('static', filename='js/main.js') }}"></script>
  {% block scripts %}{% endblock %}
</body>
</html>
